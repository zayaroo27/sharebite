services:
  postgres:
    image: postgres:16-alpine
    container_name: sharebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sharebite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: not_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sharebite"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sharebite-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sharebite
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: not_password
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong
      JWT_EXPIRATION: 86400000
      FILE_UPLOAD_DIR: /app/uploads
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: sharebite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_uploads:
